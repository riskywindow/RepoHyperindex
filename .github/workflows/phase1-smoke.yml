name: Phase 1 Smoke

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  phase1-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: python -m pip install uv

      - name: Sync dependencies
        run: uv sync

      - name: Lint
        run: uv run ruff check .

      - name: Phase 1 smoke
        run: bash bench/scripts/ci-smoke.sh
